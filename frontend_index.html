<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SocialPulse</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    header { background: #1e293b; padding: 1.5rem 2rem; border-bottom: 1px solid #334155; }
    header h1 { font-size: 1.8rem; color: #38bdf8; }
    header p  { color: #94a3b8; margin-top: 0.25rem; }
    main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card h2 { color: #38bdf8; margin-bottom: 1rem; }
    .row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    input, select { background: #0f172a; border: 1px solid #475569; color: #e2e8f0;
      padding: 0.5rem 0.75rem; border-radius: 8px; flex: 1; min-width: 140px; }
    button { background: #0284c7; color: white; border: none; padding: 0.5rem 1.25rem;
      border-radius: 8px; cursor: pointer; font-weight: 600; }
    button:hover { background: #0369a1; }
    pre { background: #0f172a; border: 1px solid #334155; border-radius: 8px;
      padding: 1rem; overflow-x: auto; font-size: 0.8rem; max-height: 400px; overflow-y: auto; margin-top: 1rem; }
    .badge { display: inline-block; background: #0284c7; color: white; font-size: 0.7rem;
      padding: 0.2rem 0.5rem; border-radius: 999px; margin-left: 0.5rem; }
  </style>
</head>
<body>
<header>
  <h1>⚡ SocialPulse</h1>
  <p>Social media data aggregation — Reddit · YouTube · Google Trends</p>
</header>
<main>
  <div class="card">
    <h2>🟠 Reddit <span class="badge">Hot Posts</span></h2>
    <div class="row">
      <input id="r-sub" placeholder="Subreddit (e.g. technology)" value="technology"/>
      <input id="r-limit" type="number" placeholder="Limit" value="5" min="1" max="100"/>
      <button onclick="fetchReddit()">Fetch</button>
    </div>
    <pre id="r-out">Results will appear here...</pre>
  </div>
  <div class="card">
    <h2>🔴 YouTube <span class="badge">Search</span></h2>
    <div class="row">
      <input id="yt-q" placeholder="Search query" value="AI news"/>
      <input id="yt-limit" type="number" placeholder="Max results" value="5" min="1" max="50"/>
      <select id="yt-order">
        <option value="relevance">Relevance</option>
        <option value="date">Date</option>
        <option value="viewCount">View Count</option>
      </select>
      <button onclick="fetchYouTube()">Search</button>
    </div>
    <pre id="yt-out">Results will appear here...</pre>
  </div>
  <div class="card">
    <h2>📈 Google Trends</h2>
    <div class="row">
      <input id="gt-kw" placeholder="Keywords (comma-separated)" value="AI,ChatGPT"/>
      <select id="gt-tf">
        <option value="today 1-m">Last month</option>
        <option value="today 3-m" selected>Last 3 months</option>
        <option value="today 12-m">Last 12 months</option>
      </select>
      <button onclick="fetchTrends()">Fetch</button>
    </div>
    <pre id="gt-out">Results will appear here...</pre>
  </div>
</main>
<script>
  const BASE = "";
  async function fetchReddit() {
    const sub   = document.getElementById("r-sub").value.trim() || "all";
    const limit = document.getElementById("r-limit").value;
    const out   = document.getElementById("r-out");
    out.textContent = "Loading...";
    try {
      const res  = await fetch(`${BASE}/reddit/hot?subreddit=${sub}&limit=${limit}`);
      const data = await res.json();
      out.textContent = JSON.stringify(data, null, 2);
    } catch (e) { out.textContent = "Error: " + e.message; }
  }
  async function fetchYouTube() {
    const q     = document.getElementById("yt-q").value.trim();
    const limit = document.getElementById("yt-limit").value;
    const order = document.getElementById("yt-order").value;
    const out   = document.getElementById("yt-out");
    out.textContent = "Loading...";
    try {
      const res  = await fetch(`${BASE}/youtube/search?q=${encodeURIComponent(q)}&max_results=${limit}&order=${order}`);
      const data = await res.json();
      out.textContent = JSON.stringify(data, null, 2);
    } catch (e) { out.textContent = "Error: " + e.message; }
  }
  async function fetchTrends() {
    const kws = document.getElementById("gt-kw").value.split(",").map(k => k.trim()).filter(Boolean);
    const tf  = document.getElementById("gt-tf").value;
    const out = document.getElementById("gt-out");
    out.textContent = "Loading...";
    try {
      const params = kws.map(k => `keywords=${encodeURIComponent(k)}`).join("&");
      const res    = await fetch(`${BASE}/gtrends/interest?${params}&timeframe=${encodeURIComponent(tf)}`);
      const data   = await res.json();
      out.textContent = JSON.stringify(data, null, 2);
    } catch (e) { out.textContent = "Error: " + e.message; }
  }
</script>
</body>
</html>
